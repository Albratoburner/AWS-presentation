            --accent-hover: #ea580c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #000;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Top Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-weight: 800;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-controls button {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .header-controls button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Main Viewport */
        .viewport {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            width: 100%;
            height: calc(100vh - 80px);
            /* Leave room for bottom bar */
        }

        /* Slide Styles */
        .slide {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: row;
            background: var(--slide-bg);
            transition: opacity 0.5s ease;
        }

        .slide.active {
            display: flex;
            animation: slideFadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes slideFadeIn {
            from {
                opacity: 0;
                transform: scale(0.98);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Slide Content (Left Side) */
        .slide-content-area {
            flex: 1;
            padding: 6rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            position: relative;
            z-index: 2;
        }

        .slide-content-area h2 {
            font-size: 3.5rem;
            color: var(--accent);
            margin-bottom: 2rem;
            line-height: 1.2;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .slide-content-area ul {
            list-style: none;
        }

        .slide-content-area ul li {
            font-size: 1.4rem;
            line-height: 1.8;
            margin-bottom: 1.2rem;
            position: relative;
            padding-left: 2.5rem;
            color: #cbd5e1;
            animation: staggerFadeIn 0.5s ease forwards;
            opacity: 0;
            transform: translateX(-10px);
        }

        /* Stagger animation for list items */
        .slide-content-area ul li:nth-child(1) {
            animation-delay: 0.2s;
        }

        .slide-content-area ul li:nth-child(2) {
            animation-delay: 0.3s;
        }

        .slide-content-area ul li:nth-child(3) {
            animation-delay: 0.4s;
        }

        .slide-content-area ul li:nth-child(4) {
            animation-delay: 0.5s;
        }

        .slide-content-area ul li:nth-child(5) {
            animation-delay: 0.6s;
        }

        .slide-content-area ul li:nth-child(6) {
            animation-delay: 0.7s;
        }

        @keyframes staggerFadeIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .slide-content-area ul li::before {
            content: '\f105';
            /* FontAwesome angle-right */
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            left: 0;
            color: var(--accent);
            font-size: 1.5rem;
            line-height: 1.5;
        }

        /* Slide Image (Right Side) */
        .slide-image-area {
            flex: 1;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* Gradient mask to blend image with dark background */
        .slide-image-area::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, #1e293b 0%, transparent 40%);
        }

        /* Title Slide Special Rule */
        .slide.title-screen {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-size: cover;
            background-position: center;
        }

        .slide.title-screen::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(5px);
        }

        .slide.title-screen .title-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 5rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 800px;
        }

        .slide.title-screen h1 {
            font-size: 4.5rem;
            color: var(--accent);
            margin-bottom: 1rem;
            text-shadow: 0 4px 20px rgba(249, 115, 22, 0.5);
        }

        .slide.title-screen h3 {
            font-size: 2rem;
            color: #e2e8f0;
            font-weight: 400;
            margin-bottom: 3rem;
        }

        /* Bottom Controls */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 80px;
            background: rgba(15, 23, 42, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 100;
        }

        .nav-btn {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.8rem 1.5rem;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .progress-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            margin: 0 3rem;
        }

        .progress-text {
            font-size: 1rem;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--accent);
            width: 5%;
            transition: width 0.3s ease;
        }

        .action-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-btn:hover {
            background: var(--accent-hover);
        }

        /* MCQ Section */
        .mcq-wrapper {
            display: none;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding: 6rem 2rem;
            background: var(--bg-color);
        }

        .mcq-wrapper.active {
            display: block;
        }

        .mcq-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .mcq-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .mcq-header h2 {
            font-size: 3rem;
            color: #3b82f6;
            /* Blue for MCQs */
        }

        .mcq-card {
            background: var(--slide-bg);
            border-radius: 12px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .mcq-card h3 {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .mcq-options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .mcq-option {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1.1rem;
            text-align: left;
            color: #fff;
        }

        .mcq-option:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .mcq-option.correct {
            background: rgba(34, 197, 94, 0.15);
            border-color: #22c55e;
            color: #4ade80;
        }

        .mcq-option.wrong {
            background: rgba(239, 68, 68, 0.15);
            border-color: #ef4444;
            color: #f87171;
        }

        .feedback {
            margin-top: 1rem;
            font-weight: 600;
            display: none;
        }

        /* Responsiveness */
        @media (max-width: 1024px) {
            .slide {
                flex-direction: column;
            }

            .slide-image-area {
                flex: 0.5;
            }

            .slide-image-area::before {
                background: linear-gradient(to bottom, #1e293b 0%, transparent 40%);
            }

            .slide-content-area {
                padding: 3rem;
            }

            .slide-content-area h2 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>

                    "Aurora drastically modernizes failovers yielding nearly instantaneous disaster sub-second recovery versus standard Multi-AZ's ~1-minute lag.",
                    "Aurora billing tiers trend somewhat higher, but routinely subsidize this premium significantly through vastly superior concurrency elasticity throughput."
                ]
            },
            {
                title: "Real-World Use Cases",
                image: "images/s23_usecases.jpg",
                points: [
                    "Web & Mobile Deployments: Massively parallel and robust backend metadata processing layers capable of handling tens of millions of users.",
                    "E-commerce Integrations: Ensuring impenetrable transactional guarantees, rigorous ACID validation, and strict consistency for global retail shopping carts.",
                    "Financial Ledgers: Securely routing, validating, and persisting highly compliant banking payment data matching international regulatory standards.",
                    "Gaming Architectures: Storing continuously updating, highly dynamic online real-time multiplayer states, virtual economies, and metadata profiles.",
                    "Enterprise ERP Migrations: Seamlessly hoisting and transplanting incredibly large-scale physical legacy SQL/Oracle warehouses directly into the secure cloud."
                ]
            },
            {
                title: "Advantages & Limitations",
                image: "images/s24_adv.jpg",
                points: [
                    "Pros: Incredible deployment velocity, automatic geographical fault tolerance, and inherently seamless vertical scaling mechanics.",
                    "Pros: Highly compatible directly translating traditional open-source engines with intensely negligible system administration workflow friction.",
                    "Cons: Pure inability to aggressively tweak raw operating system parameters or inject intensely custom system-level DB hyper-plugins.",
                    "Cons: Ultimate storage scale ceilings logically exist purely predicated on the native restrictions intrinsic to your chosen standard Database Engine.",
                    "Cons: Certain aggressive major Engine Version upgrades might fundamentally require heavily orchestrated active scheduled maintenance window disruption downtimes."
                ]
            },
            {
                title: "Conclusion",
                image: "images/s25_conc.jpg",
                points: [
                    "Amazon RDS completely revolutionizes the administration overhead traditionally associated with legacy self-hosted complex relational databases.",
                    "Aggressively accelerates engineering deployment operations enabling organizations strict focus on architectural feature development rather than IT logistics.",
                    "Offers highly customized, specialized engine pathways serving everything from lightweight web metadata up to highly critical finance applications.",
                    "Functions as the logical evolutionary architectural link safely bridging purely physical environments into highly serverless operational ecosystems.",
                    "Architects comprehensively evaluate standard RDS for generic raw compatibility or AWS Aurora for pushing extreme operational high-availability ceilings."
                ]
            }
        ];

        // MCQs
        const mcqData = [
            {
                q: "What does managing a database with Amazon RDS successfully eliminate?",
                options: ["A. Designing database tables and schema", "B. Writing and optimizing SQL queries", "C. Routine OS patching, backups, and hardware provisioning", "D. Accessing the database over the internet securely"],
                ans: 2
            },
            {
                q: "Which AWS service heavily enforces network isolation for an Amazon RDS instance?",
                options: ["A. AWS Lambda", "B. Amazon Virtual Private Cloud (VPC)", "C. Amazon Elastic Block Store (EBS)", "D. AWS CloudFormation"],
                ans: 1
            },
            {
                q: "For maximizing fault tolerance, an RDS instance should be deployed using which configuration?",
                options: ["A. Read Replica", "B. Provisioned IOPS Storage", "C. Multi-AZ deployment", "D. Magnetic Storage"],
                ans: 2
            },
            {
                q: "What is the primary purpose of an Amazon RDS Read Replica?",
                options: ["A. To provide a synchronous failover target", "B. To serve as a complete backup point in time", "C. To scale out read-heavy database workloads asymptotically", "D. To upgrade database engine versions automatically"],
                ans: 2
            },
            {
                q: "Which RDS database engine is custom-built by AWS for high-performance cloud architecture?",
                options: ["A. Oracle", "B. Amazon Aurora", "C. SQL Server", "D. MariaDB"],
                ans: 1
            },
            {
                q: "In terms of security, what natively ensures that data at rest in Amazon RDS DBs is fully encrypted?",
                options: ["A. AWS Key Management Service (KMS)", "B. Secure Socket Layers (SSL)", "C. Transport Layer Security (TLS)", "D. Amazon Route 53"],
                ans: 0
            },
            {
                q: "What is used by applications to point connection strings correctly to an Amazon RDS Database?",
                options: ["A. Elastic IP address", "B. IAM Role ARN", "C. Compute Instance ID", "D. RDS Endpoint DNS Name"],
                ans: 3
            },
            {
                q: "To deeply analyze individual slow SQL queries and track DB load, which tool is most optimal?",
                options: ["A. Performance Insights", "B. RDS Multi-AZ Dashboard", "C. AWS Systems Manager", "D. Elastic DB Tuner"],
                ans: 0
            },
            {
                q: "What limits how far back Point-In-Time Recovery (PITR) can go in Amazon RDS?",
                options: ["A. Last 24 hours only", "B. Configured backup retention period up to 35 days", "C. Indefinite recovery", "D. PITR is not supported"],
                ans: 1
            },
            {
                q: "What is a clear limitation of choosing Amazon RDS over a self-managed database on EC2?",
                options: ["A. Cannot connect over secure SSL explicitly", "B. Complete inability to scale storage after initial creation", "C. No root or SSH level access to the underlying DB operating system", "D. Must prepay hardware fee"],
                ans: 2
            }
        ];

        // System state
        let currentSlide = 0;
        let isQuizMode = false;

        const viewport = document.getElementById('viewport');
        const mcqViewport = document.getElementById('mcqViewport');
        const progressText = document.getElementById('progressText');
        const progressBar = document.getElementById('progressBar');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const toggleModeBtn = document.getElementById('toggleModeBtn');
        const progressContainer = document.getElementById('progressContainer');

        // Render slides dynamically
        function renderSlides() {
            slideData.forEach((data, index) => {
                const slideDiv = document.createElement('div');
                slideDiv.className = 'slide';
                if (index === 0) slideDiv.classList.add('active');

                if (data.isTitle) {
                    slideDiv.classList.add('title-screen');
                    slideDiv.style.backgroundImage = `url('${data.image}')`;

                    const card = document.createElement('div');
                    card.className = 'title-card';

                    const h1 = document.createElement('h1');
                    h1.textContent = data.title;
                    card.appendChild(h1);

                    const h3 = document.createElement('h3');
                    h3.textContent = data.subtitle;
                    card.appendChild(h3);

                    const ul = document.createElement('ul');
                    ul.style.listStyle = 'none';
                    ul.style.color = '#cbd5e1';

                    data.points.forEach(p => {
                        const li = document.createElement('li');
                        li.textContent = p;
                        li.style.marginBottom = '0.5rem';
                        ul.appendChild(li);
                    });

                    card.appendChild(ul);
                    slideDiv.appendChild(card);
                } else {
                    // Split Layout
                    const contentArea = document.createElement('div');
                    contentArea.className = 'slide-content-area';

                    const h2 = document.createElement('h2');
                    h2.textContent = data.title;
                    contentArea.appendChild(h2);

                    const ul = document.createElement('ul');
                    data.points.forEach(p => {
                        const li = document.createElement('li');
                        li.textContent = p;
                        ul.appendChild(li);
                    });
                    contentArea.appendChild(ul);

                    const imageArea = document.createElement('div');
                    imageArea.className = 'slide-image-area';
                    imageArea.style.backgroundImage = `url('${data.image}')`;

                    slideDiv.appendChild(contentArea);
                    slideDiv.appendChild(imageArea);
                }

                viewport.appendChild(slideDiv);
            });
        }

        // Render MCQs dynamically
        function renderMCQs() {
            const quizContainer = document.getElementById('quiz-container');
            mcqData.forEach((mcq, qIndex) => {
                const card = document.createElement('div');
                card.className = 'mcq-card';

                const title = document.createElement('h3');
                title.textContent = `Q${qIndex + 1}: ${mcq.q}`;
                card.appendChild(title);

                const optionsList = document.createElement('div');
                optionsList.className = 'mcq-options';

                const feedback = document.createElement('div');
                feedback.className = 'feedback';

                let answered = false;

                mcq.options.forEach((optStr, optIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'mcq-option';
                    btn.textContent = optStr;

                    btn.onclick = () => {
                        if (answered) return;
                        answered = true;

                        const children = optionsList.children;
                        for (let i = 0; i < children.length; i++) {
                            children[i].style.cursor = 'default';
                            if (i === mcq.ans) {
                                children[i].classList.add('correct');
                            }
                        }

                        if (optIndex === mcq.ans) {
                            feedback.textContent = '✅ Correct!';
                            feedback.style.color = '#4ade80';
                        } else {
                            btn.classList.add('wrong');
                            feedback.textContent = '❌ Incorrect. The right answer is marked in green.';
                            feedback.style.color = '#f87171';
                        }
                        feedback.style.display = 'block';
                    };

                    optionsList.appendChild(btn);
                });

                card.appendChild(optionsList);
                card.appendChild(feedback);
                quizContainer.appendChild(card);
            });
        }

        function updateUI() {
            const slides = document.querySelectorAll('.slide');
            slides.forEach((s, idx) => {
                s.classList.remove('active');
                if (idx === currentSlide) s.classList.add('active');
            });

            progressText.textContent = `Slide ${currentSlide + 1} / ${slideData.length}`;
            progressBar.style.width = `${((currentSlide + 1) / slideData.length) * 100}%`;

            prevBtn.disabled = currentSlide === 0;
            nextBtn.disabled = currentSlide === slideData.length - 1;
        }

        function nextSlide() {
            if (currentSlide < slideData.length - 1) {
                currentSlide++;
                updateUI();
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                updateUI();
            }
        }

        function toggleMode() {
            isQuizMode = !isQuizMode;
            if (isQuizMode) {
                viewport.style.display = 'none';
                mcqViewport.classList.add('active');
                toggleModeBtn.textContent = 'Back to Presentation';
                prevBtn.style.display = 'none';
                nextBtn.style.display = 'none';
                progressContainer.style.display = 'none';
            } else {
                mcqViewport.classList.remove('active');
                viewport.style.display = 'flex';
                toggleModeBtn.textContent = 'Take Quiz Mode';
                prevBtn.style.display = 'flex';
                nextBtn.style.display = 'flex';
                progressContainer.style.display = 'flex';
            }
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // Keyboard commands
        document.addEventListener('keydown', (e) => {
            if (!isQuizMode) {
                if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
                if (e.key === 'ArrowLeft') prevSlide();
            }
        });

        // Initialize
        renderSlides();
        renderMCQs();
        updateUI();

    </script>
</body>

</html>
